version: "3.8"
services:
  api:
    build: .
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - ./era5_data:/app/era5_data
      - ./models:/app/models
      - ./config:/app/config
      - ./logs:/app/logs
    environment:
      - DATA_DIR=/app/era5_data
      - MODELS_DIR=/app/models
      - PORT=5000
      - DEBUG=false
      - LOG_LEVEL=INFO
      - API_KEY=${API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
